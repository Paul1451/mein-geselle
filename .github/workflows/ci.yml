name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint + Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    env:
      MEIN_GESELLE_ROOT: ${{ github.workspace }}/mein-geselle
      _HERMES_ROOT: ${{ github.workspace }}/hermes-agent
    steps:
      - name: Checkout mein-geselle
        uses: actions/checkout@v4
        with:
          path: mein-geselle

      - name: Checkout hermes-agent (sibling repo)
        uses: actions/checkout@v4
        with:
          repository: NousResearch/hermes-agent
          path: hermes-agent
          ref: main

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache uv + pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
          key: ${{ runner.os }}-uv-${{ matrix.python-version }}-${{ hashFiles('mein-geselle/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ matrix.python-version }}-

      - name: Install uv
        run: pip install uv

      - name: Install runtime + test dependencies
        working-directory: mein-geselle
        run: |
          uv pip install --system -r requirements.txt || \
            uv pip install --system fastapi "uvicorn[standard]" jinja2 pyyaml
          uv pip install --system pytest pytest-cov

      - name: Configure git identity (for tool_remember_rule tests)
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"

      - name: Run pytest
        working-directory: mein-geselle
        run: pytest tests/ -v --tb=short
